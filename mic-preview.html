<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>sak_Uta mic icon preview</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d0d0f;
        --panel: #111113;
        --line: rgba(255, 255, 255, 0.14);
        --ink: #f3eef0;
        --muted: rgba(243, 238, 240, 0.62);
        --accent: #ef1744;
        --mic: #ffb7c5;
        --mic-dark: #d85c76;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px;
      }

      main {
        display: grid;
        gap: 20px;
        max-width: 680px;
        margin: 0 auto;
      }

      h1 {
        margin: 0;
        font-size: 1.1rem;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 0.86rem;
        line-height: 1.6;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 16px;
      }

      .card-line {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        background: rgba(17, 17, 19, 0.92);
        font-weight: 800;
      }

      .preview-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .box {
        display: grid;
        place-items: center;
        min-height: 150px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        background: #171719;
      }

      .label {
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 0.78rem;
      }

      .mic-svg {
        display: block;
        flex: 0 0 auto;
        width: 24px;
        height: 24px;
        overflow: visible;
      }

      .large .mic-svg {
        width: 132px;
        height: 132px;
      }

      .mic-svg .shadow {
        fill: rgba(239, 23, 68, 0.15);
      }

      .mic-svg .shell,
      .mic-svg .handle,
      .mic-svg .end {
        fill: var(--mic);
      }

      .mic-svg .grille {
        fill: none;
        stroke: #111113;
        stroke-width: 2.4;
        stroke-linecap: round;
        opacity: 0.75;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>無線ハンドマイク風アイコン案</h1>
        <p>参照先のような、斜め配置のシンプルな無線マイクアイコンに寄せた案です。</p>
      </header>

      <section class="panel">
        <p class="label">カード内想定</p>
        <div class="card-line">
          <span>曲名サンプル</span>
          <svg class="mic-svg" viewBox="0 0 64 64" aria-label="歌える" role="img">
            <g transform="rotate(-35 32 32)">
              <ellipse class="shadow" cx="25" cy="21" rx="17" ry="18"/>
              <rect class="shell" x="16" y="6" width="22" height="30" rx="11"/>
              <path class="grille" d="M20 13H34M19 19H35M20 25H34"/>
              <rect class="handle" x="24" y="33" width="12" height="24" rx="6"/>
              <rect class="end" x="22" y="54" width="16" height="6" rx="3"/>
            </g>
          </svg>
        </div>
      </section>

      <section class="preview-grid">
        <div>
          <p class="label">実サイズ</p>
          <div class="box">
            <svg class="mic-svg" viewBox="0 0 64 64" aria-label="歌える" role="img">
              <g transform="rotate(-35 32 32)">
                <ellipse class="shadow" cx="25" cy="21" rx="17" ry="18"/>
                <rect class="shell" x="16" y="6" width="22" height="30" rx="11"/>
                <path class="grille" d="M20 13H34M19 19H35M20 25H34"/>
                <rect class="handle" x="24" y="33" width="12" height="24" rx="6"/>
                <rect class="end" x="22" y="54" width="16" height="6" rx="3"/>
              </g>
            </svg>
          </div>
        </div>
        <div>
          <p class="label">拡大</p>
          <div class="box large">
            <svg class="mic-svg" viewBox="0 0 64 64" aria-label="歌える" role="img">
              <g transform="rotate(-35 32 32)">
                <ellipse class="shadow" cx="25" cy="21" rx="17" ry="18"/>
                <rect class="shell" x="16" y="6" width="22" height="30" rx="11"/>
                <path class="grille" d="M20 13H34M19 19H35M20 25H34"/>
                <rect class="handle" x="24" y="33" width="12" height="24" rx="6"/>
                <rect class="end" x="22" y="54" width="16" height="6" rx="3"/>
              </g>
            </svg>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>

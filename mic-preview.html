<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>sak_Uta mic icon preview</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d0d0f;
        --panel: #111113;
        --line: rgba(255, 255, 255, 0.14);
        --ink: #f3eef0;
        --muted: rgba(243, 238, 240, 0.62);
        --accent: #ef1744;
        --mic: #ffb7c5;
        --mic-dark: #d85c76;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px;
      }

      main {
        display: grid;
        gap: 20px;
        max-width: 680px;
        margin: 0 auto;
      }

      h1 {
        margin: 0;
        font-size: 1.1rem;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 0.86rem;
        line-height: 1.6;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 16px;
      }

      .card-line {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        background: rgba(17, 17, 19, 0.92);
        font-weight: 800;
      }

      .preview-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .box {
        display: grid;
        place-items: center;
        min-height: 150px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        background: #171719;
      }

      .label {
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 0.78rem;
      }

      .mic-svg {
        display: block;
        flex: 0 0 auto;
        width: 24px;
        height: 24px;
        overflow: visible;
      }

      .mic-svg .glow {
        fill: rgba(239, 23, 68, 0.14);
      }

      .mic-svg .body {
        fill: none;
        stroke: var(--mic);
        stroke-width: 5.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .mic-svg .handle {
        fill: none;
        stroke: var(--mic);
        stroke-width: 6.5;
        stroke-linecap: round;
      }

      .mic-svg .mesh {
        fill: none;
        stroke: var(--mic);
        stroke-width: 2.5;
        stroke-linecap: round;
        opacity: 0.78;
      }

      .mic-svg .neck {
        fill: none;
        stroke: var(--mic-dark);
        stroke-width: 4;
        stroke-linecap: round;
      }

      .large .mic-svg {
        width: 132px;
        height: 132px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>SM58風マイクアイコン案</h1>
        <p>一覧カードに置く実サイズと、形状確認用の拡大表示です。</p>
      </header>

      <section class="panel">
        <p class="label">カード内想定</p>
        <div class="card-line">
          <span>曲名サンプル</span>
          <svg class="mic-svg" viewBox="0 0 64 64" aria-label="歌える" role="img">
            <ellipse class="glow" cx="22" cy="21" rx="18" ry="17"/>
            <path class="body" d="M12 21C12 11 19 5 27 8C36 11 40 21 36 29C32 37 21 38 15 31C13 29 12 25 12 21Z"/>
            <path class="mesh" d="M16 18C21 15 27 15 33 18"/>
            <path class="mesh" d="M15 24C22 21 30 22 37 26"/>
            <path class="mesh" d="M19 30C25 29 30 30 35 33"/>
            <path class="neck" d="M34 34L39 39"/>
            <path class="handle" d="M39 39L56 56"/>
          </svg>
        </div>
      </section>

      <section class="preview-grid">
        <div>
          <p class="label">実サイズ</p>
          <div class="box">
            <svg class="mic-svg" viewBox="0 0 64 64" aria-label="歌える" role="img">
              <ellipse class="glow" cx="22" cy="21" rx="18" ry="17"/>
              <path class="body" d="M12 21C12 11 19 5 27 8C36 11 40 21 36 29C32 37 21 38 15 31C13 29 12 25 12 21Z"/>
              <path class="mesh" d="M16 18C21 15 27 15 33 18"/>
              <path class="mesh" d="M15 24C22 21 30 22 37 26"/>
              <path class="mesh" d="M19 30C25 29 30 30 35 33"/>
              <path class="neck" d="M34 34L39 39"/>
              <path class="handle" d="M39 39L56 56"/>
            </svg>
          </div>
        </div>
        <div>
          <p class="label">拡大</p>
          <div class="box large">
            <svg class="mic-svg" viewBox="0 0 64 64" aria-label="歌える" role="img">
              <ellipse class="glow" cx="22" cy="21" rx="18" ry="17"/>
              <path class="body" d="M12 21C12 11 19 5 27 8C36 11 40 21 36 29C32 37 21 38 15 31C13 29 12 25 12 21Z"/>
              <path class="mesh" d="M16 18C21 15 27 15 33 18"/>
              <path class="mesh" d="M15 24C22 21 30 22 37 26"/>
              <path class="mesh" d="M19 30C25 29 30 30 35 33"/>
              <path class="neck" d="M34 34L39 39"/>
              <path class="handle" d="M39 39L56 56"/>
            </svg>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>

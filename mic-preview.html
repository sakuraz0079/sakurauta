<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>sak_Uta mic emoji preview</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d0d0f;
        --panel: #111113;
        --line: rgba(255, 255, 255, 0.14);
        --ink: #f3eef0;
        --muted: rgba(243, 238, 240, 0.62);
        --accent: #ef1744;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px;
      }

      main {
        display: grid;
        gap: 20px;
        max-width: 680px;
        margin: 0 auto;
      }

      h1 {
        margin: 0;
        font-size: 1.1rem;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 0.86rem;
        line-height: 1.6;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 16px;
      }

      .label {
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 0.78rem;
      }

      .card-line {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        background: rgba(17, 17, 19, 0.92);
        font-weight: 800;
      }

      .preview-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .box {
        display: grid;
        place-items: center;
        min-height: 150px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        background: #171719;
      }

      .emoji-mic {
        display: inline-grid;
        place-items: center;
        flex: 0 0 auto;
        width: 22px;
        height: 22px;
        font-size: 15px;
        line-height: 1;
      }

      .emoji-mic.badge {
        border-radius: 999px;
        background: rgba(239, 23, 68, 0.14);
      }

      .large .emoji-mic {
        width: 132px;
        height: 132px;
        font-size: 92px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>マイク絵文字アイコン案</h1>
        <p>端末標準の 🎤 を使う案です。小さいサイズでも形が崩れにくい一方、iPhone/Android/PCで見た目が少し変わります。</p>
      </header>

      <section class="panel">
        <p class="label">カード内想定: 背景あり</p>
        <div class="card-line">
          <span>曲名サンプル</span>
          <span class="emoji-mic badge" aria-label="歌える" role="img">🎤</span>
        </div>
      </section>

      <section class="panel">
        <p class="label">カード内想定: 背景なし</p>
        <div class="card-line">
          <span>曲名サンプル</span>
          <span class="emoji-mic" aria-label="歌える" role="img">🎤</span>
        </div>
      </section>

      <section class="preview-grid">
        <div>
          <p class="label">実サイズ</p>
          <div class="box">
            <span class="emoji-mic badge" aria-label="歌える" role="img">🎤</span>
          </div>
        </div>
        <div>
          <p class="label">拡大</p>
          <div class="box large">
            <span class="emoji-mic badge" aria-label="歌える" role="img">🎤</span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>

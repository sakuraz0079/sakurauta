<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#050506">
    <title>sak_Uta</title>
    <meta name="application-name" content="sak_Uta">
    <meta name="apple-mobile-web-app-title" content="sak_Uta">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" href="./icon-192.png?v=20260615-6" type="image/png">
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png?v=20260615-6">
    <link rel="manifest" href="./manifest.webmanifest?v=20260615-6">
    <link rel="stylesheet" href="./style.css?v=20260615-6">
  </head>
  <body>
    <aside class="update-notice" id="updateNotice" aria-live="polite" hidden>
      <span>新しいバージョンがあります</span>
      <div class="update-notice-actions">
        <button id="dismissUpdateButton" type="button">あとで</button>
        <button id="applyUpdateButton" class="primary" type="button">更新する</button>
      </div>
    </aside>

    <div class="app-shell player-compact">
      <header class="topbar compact">
        <img class="brand-logo" src="./icon/sak-uta-logo-transparent.png" alt="sak_Uta">
        <button class="topbar-action" id="addTrackButton" type="button">曲追加</button>
        <button class="icon-button" id="refreshButton" type="button" aria-label="更新" title="更新">↻</button>
      </header>

      <main>
        <section class="search-panel" aria-label="検索">
          <div class="search-line">
            <div class="search-box">
              <span>⌕</span>
              <input id="searchInput" type="search" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" enterkeyhint="search" placeholder="曲名、アーティスト、メモで検索" aria-label="検索">
              <button id="clearSearchButton" class="clear-search-button" type="button" aria-label="検索をクリア" title="検索をクリア" hidden>×</button>
            </div>
            <label class="sort-mini">
              <span>↕</span>
              <select id="sortSelect" aria-label="並び替え">
                <option value="recent">新</option>
                <option value="title">曲</option>
                <option value="artist">人</option>
                <option value="favorite">★</option>
              </select>
            </label>
          </div>
          <div class="search-history" id="searchHistoryChips" aria-label="検索履歴"></div>

          <div class="playlist-box">
            <div class="playlist-head">
              <span>再生リスト</span>
              <div>
                <button class="new-list-button" id="newPlaylistButton" type="button" aria-label="リスト作成">＋</button>
                <button class="delete-list-button" id="deletePlaylistButton" type="button" aria-label="リスト削除" hidden>×</button>
              </div>
            </div>
            <select id="viewSelect" class="sr-only-select" tabindex="-1" aria-hidden="true">
              <option value="all">すべて</option>
              <option value="latest10">最新10曲</option>
              <option value="favorites">お気に入り</option>
              <option value="recentlyPlayed">最近再生</option>
            </select>
            <div class="playlist-chips" id="playlistChips" aria-label="再生リスト"></div>
          </div>

          <form class="playlist-form" id="playlistForm" hidden>
            <input id="playlistNameInput" type="text" autocomplete="off" placeholder="新しいリスト名">
            <button type="submit">作成</button>
          </form>

          <div class="chips" id="tagChips" aria-label="タグ"></div>
        </section>

        <section class="add-track-panel" id="addTrackPanel" hidden></section>

        <section class="status-row" aria-live="polite">
          <span id="countLabel">読み込み中</span>
          <span id="syncLabel">API確認中</span>
        </section>

        <section class="daily-pick" id="dailyPick" hidden></section>

        <section class="track-list" id="trackList" aria-label="曲一覧"></section>

        <nav class="pager" aria-label="ページ">
          <button id="prevPageButton" type="button">前へ</button>
          <span id="pageLabel">1 / 1</span>
          <button id="nextPageButton" type="button">次へ</button>
        </nav>
      </main>
    </div>

    <aside class="player compact" id="player" aria-label="プレイヤー">
      <div class="player-inner">
        <button id="compactPlayerButton" class="compact-player-button" type="button" aria-label="再生エリアを小さくする" title="再生エリアを小さくする"></button>
        <div class="now-playing">
          <p id="nowTitle">曲を選択</p>
          <span id="nowArtist">一覧から再生できます</span>
          <small id="nowMeta"></small>
        </div>

        <div class="wave-wrap" id="waveWrap">
          <canvas id="waveCanvas" width="720" height="54" aria-hidden="true"></canvas>
          <input id="seekRange" type="range" min="0" max="1000" value="0" step="1" aria-label="再生位置">
        </div>
        <div class="time-row">
          <span id="currentTime">0:00</span>
          <strong id="playbackStatus" class="playback-status is-empty" aria-hidden="true">&nbsp;</strong>
          <span id="durationTime">0:00</span>
        </div>

        <div class="player-controls">
          <button id="repeatButton" type="button" aria-label="リピート" title="リピート">↻</button>
          <button id="playerPrevButton" type="button" aria-label="前の曲" title="前の曲">‹</button>
          <button id="playerPlayButton" class="main-play" type="button" aria-label="再生" title="再生"></button>
          <button id="playerNextButton" type="button" aria-label="次の曲" title="次の曲">›</button>
          <button id="shuffleButton" type="button" aria-label="シャッフル" title="シャッフル">⤨</button>
        </div>
      </div>
      <audio id="audio" preload="metadata"></audio>
    </aside>

    <template id="trackTemplate">
      <article class="track-card">
        <button class="play-button" type="button" aria-label="再生">▶</button>
        <div class="track-main">
          <h2></h2>
          <p></p>
          <div class="track-stats"></div>
          <div class="track-meta"></div>
        </div>
        <button class="favorite-button" type="button" aria-label="お気に入り" title="お気に入り">☆</button>
      </article>
    </template>

    <script src="./app.js?v=20260615-6" type="module"></script>
  </body>
</html>

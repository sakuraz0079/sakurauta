<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>sak_Uta detail preview</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d0d0f;
        --panel: #111113;
        --panel-2: #18181b;
        --line: rgba(255, 255, 255, 0.14);
        --ink: #f3eef0;
        --muted: rgba(243, 238, 240, 0.62);
        --accent: #ef1744;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 18px;
      }

      main {
        max-width: 680px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1rem;
      }

      .note {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 0.84rem;
        line-height: 1.6;
      }

      .track-card {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr) 38px;
        gap: 9px;
        align-items: center;
        min-height: 106px;
        padding: 10px;
        border: 1px solid rgba(239, 23, 68, 0.62);
        border-radius: 8px;
        background: #151518;
        box-shadow: 0 12px 26px rgba(0, 0, 0, 0.28);
      }

      .play-button,
      .favorite-button {
        display: grid;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-2);
        color: var(--ink);
      }

      .play-button {
        width: 42px;
        height: 42px;
        border-color: rgba(255, 255, 255, 0.22);
        background: linear-gradient(145deg, #ef1744, #8d0922);
      }

      .favorite-button {
        width: 38px;
        height: 38px;
        color: #ff5575;
      }

      .track-main {
        min-width: 0;
      }

      .title-row {
        display: flex;
        align-items: center;
        gap: 7px;
        margin: 0;
        color: #fff;
        font-size: 1.03rem;
        line-height: 1.25;
      }

      .emoji-mic {
        display: inline-grid;
        place-items: center;
        width: 22px;
        height: 22px;
        border-radius: 999px;
        background: rgba(239, 23, 68, 0.14);
        font-size: 15px;
        line-height: 1;
      }

      .artist {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.82rem;
      }

      .stats {
        display: flex;
        gap: 7px;
        margin-top: 4px;
        color: #ff5575;
        font-size: 0.86rem;
        font-weight: 700;
      }

      .card-meta {
        margin-top: 4px;
        text-align: right;
        color: rgba(243, 238, 240, 0.42);
        font-size: 0.72rem;
      }

      .inline-detail {
        grid-column: 1 / -1;
        display: grid;
        gap: 12px;
        margin-top: 2px;
        padding: 12px 2px 2px;
        border-top: 1px solid var(--line);
      }

      .detail-block {
        display: grid;
        gap: 8px;
      }

      .detail-title {
        color: var(--muted);
        font-size: 0.72rem;
        font-weight: 800;
      }

      .sing-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .info-cell {
        min-width: 0;
        padding: 9px 10px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.07);
      }

      .info-label {
        display: block;
        margin-bottom: 3px;
        color: rgba(243, 238, 240, 0.52);
        font-size: 0.7rem;
        font-weight: 800;
      }

      .info-value {
        display: block;
        overflow-wrap: anywhere;
        color: var(--ink);
        font-size: 0.92rem;
        font-weight: 800;
      }

      .tag-row,
      .membership-row,
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }

      .tag,
      .membership {
        min-width: 0;
        max-width: 100%;
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--muted);
        font-size: 0.8rem;
      }

      .memo {
        margin: 0;
        padding: 10px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.07);
        color: var(--ink);
        font-size: 0.92rem;
        line-height: 1.5;
      }

      .file-text {
        margin: 0;
        color: rgba(243, 238, 240, 0.5);
        font-size: 0.76rem;
        overflow-wrap: anywhere;
      }

      .actions button,
      .actions select {
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-2);
        color: var(--ink);
        font-size: 0.82rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>詳細表示案</h1>
      <p class="note">現在の「カードをタップすると下に展開する」操作は維持し、詳細内の情報だけを整理する案です。</p>

      <article class="track-card">
        <button class="play-button" type="button">▶</button>
        <div class="track-main">
          <h2 class="title-row">
            <span>Get Along Together</span>
            <span class="emoji-mic" aria-label="歌える" role="img">🎤</span>
          </h2>
          <p class="artist">Yasuhiro Yamane</p>
          <div class="stats">★★★★☆ <span>Re 2</span></div>
          <div class="card-meta">Mastering-3 · 2026/06/01</div>
        </div>
        <button class="favorite-button" type="button">★</button>

        <div class="inline-detail">
          <section class="detail-block">
            <span class="detail-title">歌う判断</span>
            <div class="sing-grid">
              <div class="info-cell">
                <span class="info-label">最高音</span>
                <span class="info-value">mid2G#</span>
              </div>
              <div class="info-cell">
                <span class="info-label">キー</span>
                <span class="info-value">+2</span>
              </div>
              <div class="info-cell">
                <span class="info-label">評価</span>
                <span class="info-value">★★★★☆</span>
              </div>
              <div class="info-cell">
                <span class="info-label">録り直し</span>
                <span class="info-value">Re 2</span>
              </div>
            </div>
          </section>

          <section class="detail-block">
            <span class="detail-title">分類</span>
            <div class="tag-row">
              <span class="tag">Mastering</span>
              <span class="tag">Ballad</span>
              <span class="tag">Karaoke</span>
            </div>
          </section>

          <section class="detail-block">
            <span class="detail-title">メモ</span>
            <p class="memo">Aメロは抑えめ。サビ前で少し息を残す。</p>
          </section>

          <section class="detail-block">
            <span class="detail-title">管理情報</span>
            <p class="file-text">Get_Along_Together_Re_Mastering-3.wav</p>
          </section>

          <section class="detail-block">
            <span class="detail-title">入っているリスト</span>
            <div class="membership-row">
              <span class="membership">お気に入り</span>
              <span class="membership">練習中 ×</span>
            </div>
          </section>

          <div class="actions">
            <button type="button">★ お気に入り</button>
            <select aria-label="追加先リスト">
              <option>練習中</option>
            </select>
            <button type="button">リストに追加</button>
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
